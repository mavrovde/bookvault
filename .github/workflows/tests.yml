name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for GITHUB_TOKEN: this workflow only checks out
# code and runs tests, it never needs to write anything back to the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No `playwright install` step needed: the test suite never launches a
      # real browser (LitresClient is always faked/bypassed -- see
      # tests/fakes.py), so only the Python package is required, not the
      # Chromium binary.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v
