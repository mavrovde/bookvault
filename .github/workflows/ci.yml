name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default for GITHUB_TOKEN: every job here only checks out
# code and reads dependencies, none of them write anything back to the repo.
permissions:
  contents: read

# A new push to the same branch/PR supersedes any run already in flight for
# it -- no point burning runner minutes on a commit that's already stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matches the "Python 3.11+" floor called out in the README.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # No `playwright install` step needed: the test suite never launches a
      # real browser (LitresClient is always faked/bypassed -- see
      # tests/fakes.py), so only the Python package is required, not the
      # Chromium binary.
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v --cov=app --cov-report=term-missing

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt
